name: swiss
description: "Swiss is an app where user can find a nearby rider, request a service, and complete a basic delivery/transport job, accross Nigeria"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_secure_storage: ^10.3.1
  dio: ^5.10.0
  go_router: ^17.3.0
  lucide_icons_flutter: ^3.1.14+2
  intl: ^0.20.3
  provider: ^6.1.5+1
  pretty_dio_logger: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/logos/



  # To add custom fonts to your application, add a fonts section here,
